name: Daily Music Card Generator

on:
  schedule:
    # 每天 UTC 22:00 (即北京时间早上 6:00) 运行
    - cron: '0 22 * * *'
  workflow_dispatch: # 允许你在网页上随时手动点击运行测试

permissions:
  contents: write # 允许 Action 推送代码到你的仓库

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Music Script
        run: |
          python main.py

      - name: Commit and Push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add outputs/
          # 只有在有更改时才 commit，防止报错
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-generate daily music post" && git push)
